<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta GNA - Evento 28 de Julio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary-color: #2d5a27; --hover-color: #1e3d1a; --secondary-color: #6c757d; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 600px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        .btn-gna { 
            background-color: var(--primary-color); 
            color: white; border-radius: 50px; padding: 12px 24px;
            border: none; font-weight: 600; transition: all 0.3s;
            width: 100%; text-align: center;
        }
        .btn-gna:hover { background-color: var(--hover-color); color: white; transform: translateY(-2px); }
        .btn-back { background-color: var(--secondary-color); width: auto; min-width: 120px; }
        .btn-next { width: auto; min-width: 120px; }
        .chart-container { position: relative; height: 260px; margin-bottom: 2rem; }
        .counter-badge { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-close-white { filter: brightness(0) invert(1); }
        .admin-link { color: #aaa; text-decoration: none; font-size: 0.8rem; margin-top: 20px; display: block; text-align: center; }
        .admin-link:hover { color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="card p-4 bg-white">
        <form id="surveyForm">
            
            <div class="step active" id="step1">
                <h3 class="text-center mb-4 text-success">Datos del Personal</h3>
                <div class="mb-3">
                    <label class="form-label fw-bold">Jerarquía</label>
                    <select id="jerarquia" class="form-select" required>
                        <option value="">Seleccione...</option>
                        <optgroup label="Oficiales"><option>Comandante General</option><option>Comandante Mayor</option><option>Comandante Principal</option><option>Comandante</option><option>Segundo Comandante</option><option>Primer Alférez</option><option>Alférez</option><option>Subalférez</option></optgroup>
                        <optgroup label="Suboficiales"><option>Suboficial Mayor</option><option>Suboficial Principal</option><option>Sargento Ayudante</option><option>Sargento Primero</option><option>Sargento</option><option>Cabo Primero</option><option>Cabo</option><option>Gendarme</option></optgroup>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombres y Apellidos</label>
                    <input type="text" id="nombreCompleto" class="form-control" required>
                </div>
                <div class="row mb-4">
                    <div class="col-6"><label class="form-label fw-bold">CE</label><input type="number" id="ce" class="form-control" required></div>
                    <div class="col-6"><label class="form-label fw-bold">MI</label><input type="number" id="mi" class="form-control" required></div>
                </div>
                <button type="button" class="btn-gna" onclick="validateAndNext(1, 2)">Siguiente</button>
            </div>

            <div class="step" id="step2">
                <h4 class="mb-3 text-success">Preferencia de Evento</h4>
                <div class="list-group mb-4">
                    <label class="list-group-item p-3"><input class="form-check-input me-2" type="radio" name="opEvento" value="Fiesta 28 Julio" required> Fiesta 28 de Julio</label>
                    <label class="list-group-item p-3"><input class="form-check-input me-2" type="radio" name="opEvento" value="Solo Cena"> Solo Cena</label>
                    <label class="list-group-item p-3"><input class="form-check-input me-2" type="radio" name="opEvento" value="Solo Almuerzo"> Solo Almuerzo</label>
                    <label class="list-group-item p-3 bg-light text-danger"><input class="form-check-input me-2" type="radio" name="opEvento" value="No quiero nada"> <strong>No quiero nada</strong></label>
                </div>
                <div class="d-flex justify-content-between">
                    <button type="button" class="btn-gna btn-back" onclick="prevStep(1)">Atrás</button>
                    <button type="button" class="btn-gna btn-next" onclick="validateAndNext(2, 3)">Siguiente</button>
                </div>
            </div>

            <div class="step" id="step3">
                <h4 class="mb-3 text-success">Postulación a Comisión</h4>
                <div class="list-group mb-4">
                    <label class="list-group-item p-3"><input class="form-check-input me-2" type="radio" name="opVol" value="Voluntario Fiesta" required> Comisión Fiesta</label>
                    <label class="list-group-item p-3"><input class="form-check-input me-2" type="radio" name="opVol" value="Voluntario Cena"> Comisión Cena</label>
                    <label class="list-group-item p-3"><input class="form-check-input me-2" type="radio" name="opVol" value="Voluntario Almuerzo"> Comisión Almuerzo</label>
                    <label class="list-group-item p-3"><input class="form-check-input me-2" type="radio" name="opVol" value="No deseo postularme"> No deseo postularme</label>
                </div>
                <div class="d-flex justify-content-between">
                    <button type="button" class="btn-gna btn-back" onclick="prevStep(2)">Atrás</button>
                    <button type="button" class="btn-gna btn-next" onclick="processVoluntary()">Enviar</button>
                </div>
            </div>

            <div class="step" id="step4">
                <div class="text-center mb-3">
                    <h4 class="text-success mb-0">Estadísticas en Vivo</h4>
                    <div class="counter-badge" id="totalVotos">0</div>
                    <small class="text-muted">Participantes</small>
                </div>
                <div class="chart-container"><canvas id="chartEventos"></canvas></div>
                <div class="chart-container"><canvas id="chartVoluntarios"></canvas></div>
                <button type="button" class="btn-gna" onclick="nextStep(5)">Finalizar</button>
            </div>

            <div class="step text-center py-4" id="step5">
                <h1 class="display-1 text-success mb-3">✓</h1>
                <h3>¡Muchas gracias!</h3>
                <p class="text-muted">Tu respuesta ha sido procesada.</p>
            </div>
        </form>
        
        <a href="#" class="admin-link" onclick="openAdminPanel()">🔓 Panel Administrador</a>
    </div>
</div>

<div class="modal fade" id="modalPostulacion" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Confirmar Voluntariado</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center p-4">
                <p class="fw-bold fs-5 text-primary">"Me postulo voluntariamente a participar de la comisión"</p>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn-gna" onclick="submitFinal()">Confirmar y Enviar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAdminPanel" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Gestión de Encuesta (Admin)</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex flex-wrap gap-2 justify-content-center mb-4">
                    <button class="btn btn-outline-success" onclick="renderTable('voluntarios')">Lista Voluntarios</button>
                    <button class="btn btn-outline-primary" onclick="renderTable('total')">Lista Total Votantes</button>
                    <button class="btn btn-danger" onclick="adminReset()">Eliminar Base de Datos</button>
                </div>
                
                <div id="adminTableContent" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 id="tableTitle">Listado</h6>
                        <button class="btn btn-sm btn-success" onclick="downloadPDF()">Descargar PDF</button>
                    </div>
                    <div class="table-responsive" style="max-height: 350px;">
                        <table class="table table-hover table-sm small" id="tablaAdmin">
                            <thead class="table-dark" id="tablaHead"></thead>
                            <tbody id="tablaBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDcCK0-AfxcszXj4RR6RYbKNiVYaOseLW4",
        authDomain: "fiesta-encuesta.firebaseapp.com",
        projectId: "fiesta-encuesta",
        storageBucket: "fiesta-encuesta.firebasestorage.app",
        messagingSenderId: "18000932530",
        appId: "1:18000932530:web:09a949b2a9cf9c81ad23ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const encuestasRef = collection(db, "encuestas_gna");

    // Bloqueo por dispositivo
    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('voto_gna_realizado') === 'true') nextStep(5);
    });

    window.nextStep = (n) => {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
        if(n === 4) initCharts();
    };
    window.prevStep = (n) => nextStep(n);

    window.validateAndNext = (curr, nxt) => {
        const step = document.getElementById('step'+curr);
        const inputs = step.querySelectorAll('input, select');
        let v = true; inputs.forEach(i => { if(!i.checkValidity()){i.reportValidity(); v=false;} });
        if(v) nextStep(nxt);
    };

    const modPost = new bootstrap.Modal(document.getElementById('modalPostulacion'));
    const modAdmin = new bootstrap.Modal(document.getElementById('modalAdminPanel'));

    window.processVoluntary = () => {
        const val = document.querySelector('input[name="opVol"]:checked').value;
        if(val === "No deseo postularme") submitFinal();
        else modPost.show();
    };

    window.submitFinal = async () => {
        const data = {
            jer: document.getElementById('jerarquia').value,
            nom: document.getElementById('nombreCompleto').value,
            ce: document.getElementById('ce').value,
            mi: document.getElementById('mi').value,
            ev: document.querySelector('input[name="opEvento"]:checked').value,
            vol: document.querySelector('input[name="opVol"]:checked').value,
            ts: new Date().toLocaleString()
        };
        await addDoc(encuestasRef, data);
        localStorage.setItem('voto_gna_realizado', 'true');
        modPost.hide();
        nextStep(4);
    };

    // --- FUNCIONES ADMIN ---
    window.openAdminPanel = () => {
        if(prompt("Clave de Acceso:") === "Emi25") modAdmin.show();
        else alert("Acceso denegado");
    };

    window.renderTable = async (type) => {
        const snap = await getDocs(encuestasRef);
        const head = document.getElementById('tablaHead');
        const body = document.getElementById('tablaBody');
        const title = document.getElementById('tableTitle');
        document.getElementById('adminTableContent').style.display = 'block';
        
        body.innerHTML = "";
        if(type === 'voluntarios') {
            title.innerText = "Lista de Voluntarios Postulados";
            head.innerHTML = "<tr><th>Jerarquía</th><th>Nombre</th><th>Comisión</th><th>MI</th></tr>";
            snap.forEach(d => {
                const i = d.data();
                if(i.vol !== "No deseo postularme") body.innerHTML += `<tr><td>${i.jer}</td><td>${i.nom}</td><td>${i.vol}</td><td>${i.mi}</td></tr>`;
            });
        } else {
            title.innerText = "Lista Total de Votantes";
            head.innerHTML = "<tr><th>Jerarquía</th><th>Nombre</th><th>Votó Por</th><th>CE</th></tr>";
            snap.forEach(d => {
                const i = d.data();
                body.innerHTML += `<tr><td>${i.jer}</td><td>${i.nom}</td><td>${i.ev}</td><td>${i.ce}</td></tr>`;
            });
        }
    };

    window.downloadPDF = () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.text(document.getElementById('tableTitle').innerText, 14, 15);
        docPDF.autoTable({ html: '#tablaAdmin', startY: 20, theme: 'grid', headStyles: { fillStyle: [45, 90, 39] } });
        docPDF.save("reporte_encuesta_gna.pdf");
    };

    window.adminReset = async () => {
        if(confirm("¿Seguro de ELIMINAR TODA la base de datos? Esta acción es irreversible.")) {
            const snap = await getDocs(encuestasRef);
            await Promise.all(snap.docs.map(d => deleteDoc(doc(db, "encuestas_gna", d.id))));
            localStorage.removeItem('voto_gna_realizado');
            alert("Base de datos borrada.");
            location.reload();
        }
    };

    // --- CHARTS ---
    let c1, c2;
    function initCharts() {
        onSnapshot(encuestasRef, (snap) => {
            document.getElementById('totalVotos').innerText = snap.size;
            const ev = { "Fiesta 28 Julio":0, "Solo Cena":0, "Solo Almuerzo":0, "No quiero nada":0 };
            const vl = { "Voluntario Fiesta":0, "Voluntario Cena":0, "Voluntario Almuerzo":0, "No deseo postularme":0 };
            snap.forEach(d => {
                const x = d.data();
                if(ev[x.ev] !== undefined) ev[x.ev]++;
                if(vl[x.vol] !== undefined) vl[x.vol]++;
            });
            renderPie('chartEventos', "Preferencia de Evento", ev, c1, (c) => c1=c);
            renderPie('chartVoluntarios', "Postulaciones", vl, c2, (c) => c2=c);
        });
    }

    function renderPie(id, t, d, inst, set) {
        const ctx = document.getElementById(id).getContext('2d');
        if(inst) inst.destroy();
        set(new Chart(ctx, {
            type: 'pie',
            data: { labels: Object.keys(d), datasets:[{ data: Object.values(d), backgroundColor: ['#2d5a27','#4ca64c','#85c185','#adb5bd'] }]},
            options: { responsive:true, maintainAspectRatio:false, plugins: { title: { display:true, text:t } } }
        }));
    }
</script>
</body>
</html>
