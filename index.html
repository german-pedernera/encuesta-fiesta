<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Educación Física GNA</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary-color: #2d5a27; --hover-color: #1e3d1a; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 600px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease-out; }
        .btn-gna { background-color: var(--primary-color); color: white; border-radius: 50px; padding: 12px 24px; border: none; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-gna:hover { background-color: var(--hover-color); color: white; transform: translateY(-2px); }
        
        input[type="text"], select { text-transform: uppercase; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .admin-link { color: #bbb; text-decoration: none; font-size: 0.8rem; display: block; text-align: center; margin-top: 20px; cursor: pointer; }
        .vote-counter { background: var(--primary-color); color: white; padding: 5px 15px; border-radius: 10px; font-weight: bold; }
        .table-admin input, .table-admin select { font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="card p-4 bg-white shadow-lg">
        <form id="surveyForm">
            <div class="step active" id="step1">
                <h3 class="text-center mb-4 text-success">IDENTIFICACIÓN PERSONAL</h3>
                <div class="mb-3">
                    <label class="form-label fw-bold">JERARQUÍA</label>
                    <select id="jerarquia" class="form-select" required>
                        <option value="">SELECCIONE...</option>
                        <optgroup label="─── OFICIALES ───">
                            <option>COMANDANTE GENERAL</option>
                            <option>COMANDANTE MAYOR</option>
                            <option>COMANDANTE PRINCIPAL</option>
                            <option>COMANDANTE</option>
                            <option>SEGUNDO COMANDANTE</option>
                            <option>PRIMER ALFÉREZ</option>
                            <option>ALFÉREZ</option>
                            <option>SUBALFÉREZ</option>
                        </optgroup>
                        <optgroup label="─── SUBOFICIALES ───">
                            <option>SUBOFICIAL MAYOR</option>
                            <option>SUBOFICIAL PRINCIPAL</option>
                            <option>SARGENTO AYUDANTE</option>
                            <option>SARGENTO PRIMERO</option>
                            <option>SARGENTO</option>
                            <option>CABO PRIMERO</option>
                            <option>CABO</option>
                            <option>GENDARME</option>
                        </optgroup>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">NOMBRES Y APELLIDOS</label>
                    <input type="text" id="nombreCompleto" class="form-control" placeholder="NOMBRE COMPLETO" required>
                </div>
                <div class="row mb-4">
                    <div class="col-6"><label class="form-label fw-bold">CE</label><input type="number" id="ce" class="form-control" required></div>
                    <div class="col-6"><label class="form-label fw-bold">MI</label><input type="number" id="mi" class="form-control" required></div>
                </div>
                <p class=" text-center">- Complete todos los campos -</p>
                <button type="button" class="btn-gna" onclick="validateStep(1, 2)">SIGUIENTE</button>
            </div>

            <div class="step" id="step2">
                <h4 class="mb-3 text-success text-center">PREFERENCIA DE EVENTO</h4>
                <div class="list-group mb-4">
                    <label class="list-group-item"><input class="form-check-input me-2" type="radio" name="opEvento" value="FIESTA 28 JULIO" required> FIESTA 28 JULIO</label>
                    <label class="list-group-item"><input class="form-check-input me-2" type="radio" name="opEvento" value="SOLO CENA"> SOLO CENA</label>
                    <label class="list-group-item"><input class="form-check-input me-2" type="radio" name="opEvento" value="SOLO ALMUERZO"> SOLO ALMUERZO</label>
                    <label class="list-group-item"><input class="form-check-input me-2" type="radio" name="opEvento" value="NO DESEA NADA"> NO DESEA NADA</label>
                </div>
                <button type="button" class="btn-gna" onclick="validateStep(2, 3)">SIGUIENTE</button>
            </div>

            <div class="step" id="step3">
                <h4 class="mb-3 text-success text-center">QUIERO SER PARTE DE LA COMISIÓN</h4>
                <div class="list-group mb-4">
                    <label class="list-group-item"><input class="form-check-input me-2" type="radio" name="opVol" value="VOLUNTARIO FIESTA" required> VOLUNTARIO FIESTA</label>
                    <label class="list-group-item"><input class="form-check-input me-2" type="radio" name="opVol" value="VOLUNTARIO CENA"> VOLUNTARIO CENA</label>
                    <label class="list-group-item"><input class="form-check-input me-2" type="radio" name="opVol" value="VOLUNTARIO ALMUERZO"> VOLUNTARIO ALMUERZO</label>
                    <label class="list-group-item"><input class="form-check-input me-2" type="radio" name="opVol" value="NO DESEA POSTULARSE"> NO DESEA POSTULARSE</label>
                </div>
                <button type="button" class="btn-gna" onclick="submitFinal()">ENVIAR</button>
            </div>
        </form>
        <span class="admin-link" onclick="openAdmin()">⚙️ ACCESO ADMINISTRADOR</span>
    </div>
</div>

<div class="modal fade" id="modalAlert" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content text-center shadow border-0">
            <div id="alertHeader" class="modal-header justify-content-center text-white border-0">
                <h6 class="modal-title" id="alertTitle">AVISO</h6>
            </div>
            <div class="modal-body fw-bold" id="alertBody"></div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-dark btn-sm px-4 rounded-pill" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAdmin" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">GESTIÓN DE DATOS | <span class="vote-counter">TOTAL VOTOS: <span id="vCount">0</span></span></h5>
                <div class="ms-auto d-flex gap-2">
                    <button class="btn btn-info btn-sm fw-bold" onclick="showCharts()">📊 GRÁFICOS</button>
                    <button class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">CERRAR</button>
                </div>
            </div>
            <div class="modal-body">
                <div class="row mb-3">
                    <div class="col-md-8">
                        <input type="text" id="adminSearch" class="form-control" placeholder="🔍 BUSCAR POR NOMBRE, CE, JERARQUÍA, EVENTO O COMISIÓN..." onkeyup="filterAdmin()">
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-success w-100" onclick="downloadPDF()">GENERAR PDF</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-sm align-middle table-admin">
                        <thead class="table-dark text-center">
                            <tr>
                                <th>JERARQUÍA</th><th>NOMBRE</th><th>CE</th><th>MI</th><th>EVENTO</th><th>COMISIÓN</th><th>ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCharts" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">ESTADÍSTICAS GENERALES</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6"><canvas id="cEv"></canvas></div>
                    <div class="col-md-6"><canvas id="cVol"></canvas></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDcCK0-AfxcszXj4RR6RYbKNiVYaOseLW4",
        authDomain: "fiesta-encuesta.firebaseapp.com",
        projectId: "fiesta-encuesta",
        storageBucket: "fiesta-encuesta.firebasestorage.app",
        messagingSenderId: "18000932530",
        appId: "1:18000932530:web:09a949b2a9cf9c81ad23ab"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ref = collection(db, "encuestas_gna");

    let allDocs = [];
    const modAlert = new bootstrap.Modal(document.getElementById('modalAlert'));
    const modAdmin = new bootstrap.Modal(document.getElementById('modalAdmin'));
    const modCharts = new bootstrap.Modal(document.getElementById('modalCharts'));

    window.showAlert = (m, type='success') => {
        document.getElementById('alertHeader').className = `modal-header justify-content-center text-white border-0 ${type === 'success' ? 'bg-success' : 'bg-danger'}`;
        document.getElementById('alertTitle').innerText = type === 'success' ? 'ÉXITO' : 'ERROR';
        document.getElementById('alertBody').innerText = m;
        modAlert.show();
    };

    window.validateStep = (c, n) => {
        const step = document.getElementById('step'+c);
        let ok = true;
        step.querySelectorAll('[required]').forEach(i => { if(!i.checkValidity()){i.reportValidity(); ok=false;} });
        if(ok) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
        }
    };

    window.submitFinal = async () => {
        const ceVal = document.getElementById('ce').value;
        const miVal = document.getElementById('mi').value;
        const nomVal = document.getElementById('nombreCompleto').value.toUpperCase().trim();

        try {
            const snap = await getDocs(ref);
            let duplicado = false;
            let campoDuplicado = "";

            snap.forEach(doc => {
                const data = doc.data();
                if (data.ce == ceVal) { duplicado = true; campoDuplicado = "CE"; }
                if (data.mi == miVal) { duplicado = true; campoDuplicado = "MI"; }
                if (data.nom == nomVal) { duplicado = true; campoDuplicado = "NOMBRE Y APELLIDO"; }
            });

            if (duplicado) {
                showAlert(`YA EXISTE UN REGISTRO CON ESTE ${campoDuplicado}`, "danger");
                return;
            }

            const dataToSave = {
                jer: document.getElementById('jerarquia').value,
                nom: nomVal,
                ce: ceVal,
                mi: miVal,
                ev: document.querySelector('input[name="opEvento"]:checked').value,
                vol: document.querySelector('input[name="opVol"]:checked').value
            };

            await addDoc(ref, dataToSave);
            showAlert("¡REGISTRO COMPLETADO EXITOSAMENTE!");
            setTimeout(() => location.reload(), 2000);

        } catch(e) { 
            showAlert("ERROR AL PROCESAR EL REGISTRO", "danger"); 
        }
    };

    window.openAdmin = () => {
        if(prompt("CLAVE DE ACCESO:") === "Emi25") {
            onSnapshot(ref, (snap) => {
                allDocs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('vCount').innerText = allDocs.length;
                filterAdmin();
            });
            modAdmin.show();
        } else { alert("CLAVE INCORRECTA"); }
    };

    window.filterAdmin = () => {
        const queryText = document.getElementById('adminSearch').value.toLowerCase();
        const filtered = allDocs.filter(d => 
            (d.nom && d.nom.toLowerCase().includes(queryText)) || 
            (d.ce && d.ce.toString().includes(queryText)) || 
            (d.jer && d.jer.toLowerCase().includes(queryText)) ||
            (d.ev && d.ev.toLowerCase().includes(queryText)) ||
            (d.vol && d.vol.toLowerCase().includes(queryText))
        );
        
        const body = document.getElementById('adminTableBody');
        body.innerHTML = '';
        filtered.forEach(d => {
            // Visualización forzada en MAYÚSCULAS en la tabla administrativa
            const jerUpperCase = d.jer ? d.jer.toUpperCase() : "";
            const nomUpperCase = d.nom ? d.nom.toUpperCase() : "";
            const evUpperCase = d.ev ? d.ev.toUpperCase() : "";
            const volUpperCase = d.vol ? d.vol.toUpperCase() : "";

            body.innerHTML += `
                <tr>
                    <td>
                        <select id="j-${d.id}" class="form-select form-select-sm">
                            <option ${jerUpperCase==='COMANDANTE GENERAL'?'selected':''}>COMANDANTE GENERAL</option>
                            <option ${jerUpperCase==='COMANDANTE MAYOR'?'selected':''}>COMANDANTE MAYOR</option>
                            <option ${jerUpperCase==='COMANDANTE PRINCIPAL'?'selected':''}>COMANDANTE PRINCIPAL</option>
                            <option ${jerUpperCase==='COMANDANTE'?'selected':''}>COMANDANTE</option>
                            <option ${jerUpperCase==='SEGUNDO COMANDANTE'?'selected':''}>SEGUNDO COMANDANTE</option>
                            <option ${jerUpperCase==='PRIMER ALFÉREZ'?'selected':''}>PRIMER ALFÉREZ</option>
                            <option ${jerUpperCase==='ALFÉREZ'?'selected':''}>ALFÉREZ</option>
                            <option ${jerUpperCase==='SUBALFÉREZ'?'selected':''}>SUBALFÉREZ</option>
                            <option ${jerUpperCase==='SUBOFICIAL MAYOR'?'selected':''}>SUBOFICIAL MAYOR</option>
                            <option ${jerUpperCase==='SUBOFICIAL PRINCIPAL'?'selected':''}>SUBOFICIAL PRINCIPAL</option>
                            <option ${jerUpperCase==='SARGENTO AYUDANTE'?'selected':''}>SARGENTO AYUDANTE</option>
                            <option ${jerUpperCase==='SARGENTO PRIMERO'?'selected':''}>SARGENTO PRIMERO</option>
                            <option ${jerUpperCase==='SARGENTO'?'selected':''}>SARGENTO</option>
                            <option ${jerUpperCase==='CABO PRIMERO'?'selected':''}>CABO PRIMERO</option>
                            <option ${jerUpperCase==='CABO'?'selected':''}>CABO</option>
                            <option ${jerUpperCase==='GENDARME'?'selected':''}>GENDARME</option>
                        </select>
                    </td>
                    <td><input id="n-${d.id}" class="form-control form-control-sm" value="${nomUpperCase}"></td>
                    <td><input id="c-${d.id}" class="form-control form-control-sm text-center" value="${d.ce}" type="number"></td>
                    <td><input id="m-${d.id}" class="form-control form-control-sm text-center" value="${d.mi}" type="number"></td>
                    <td>
                        <select id="e-${d.id}" class="form-select form-select-sm">
                            <option ${evUpperCase === 'FIESTA 28 JULIO' ? 'selected':''}>FIESTA 28 JULIO</option>
                            <option ${evUpperCase === 'SOLO CENA' ? 'selected':''}>SOLO CENA</option>
                            <option ${evUpperCase === 'SOLO ALMUERZO' ? 'selected':''}>SOLO ALMUERZO</option>
                            <option ${evUpperCase === 'NO DESEA NADA' ? 'selected':''}>NO DESEA NADA</option>
                        </select>
                    </td>
                    <td>
                        <select id="v-${d.id}" class="form-select form-select-sm">
                            <option ${volUpperCase === 'VOLUNTARIO FIESTA' ? 'selected':''}>VOLUNTARIO FIESTA</option>
                            <option ${volUpperCase === 'VOLUNTARIO CENA' ? 'selected':''}>VOLUNTARIO CENA</option>
                            <option ${volUpperCase === 'VOLUNTARIO ALMUERZO' ? 'selected':''}>VOLUNTARIO ALMUERZO</option>
                            <option ${volUpperCase === 'NO DESEA POSTULARSE' ? 'selected':''}>NO DESEA POSTULARSE</option>
                        </select>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-primary btn-sm" onclick="saveEdits('${d.id}')">💾</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteRec('${d.id}')">🗑️</button>
                    </td>
                </tr>`;
        });
    };

    window.saveEdits = async (id) => {
        const upd = {
            jer: document.getElementById('j-'+id).value,
            nom: document.getElementById('n-'+id).value.toUpperCase(),
            ce: document.getElementById('c-'+id).value,
            mi: document.getElementById('m-'+id).value,
            ev: document.getElementById('e-'+id).value,
            vol: document.getElementById('v-'+id).value
        };
        await updateDoc(doc(db, "encuestas_gna", id), upd);
        showAlert("CAMBIOS GUARDADOS EXITOSAMENTE");
    };

    window.deleteRec = async (id) => {
        if(confirm("¿ESTÁ SEGURO DE ELIMINAR ESTE REGISTRO?")) await deleteDoc(doc(db, "encuestas_gna", id));
    };

    let ch1, ch2;
    window.showCharts = () => {
        modCharts.show();
        const evData = { "FIESTA 28 JULIO":0, "SOLO CENA":0, "SOLO ALMUERZO":0, "NO DESEA NADA":0 };
        const volData = { "VOLUNTARIO FIESTA":0, "VOLUNTARIO CENA":0, "VOLUNTARIO ALMUERZO":0, "NO DESEA POSTULARSE":0 };
        
        allDocs.forEach(d => {
            if(evData[d.ev] !== undefined) evData[d.ev]++;
            if(volData[d.vol] !== undefined) volData[d.vol]++;
        });

        if(ch1) ch1.destroy();
        if(ch2) ch2.destroy();

        ch1 = new Chart(document.getElementById('cEv'), {
            type: 'pie',
            data: { labels: Object.keys(evData), datasets:[{ data: Object.values(evData), backgroundColor:['#2d5a27','#4ca64c','#85c185','#adb5bd'] }] },
            options: { plugins: { title: { display:true, text: 'VOTACIÓN EVENTO' } } }
        });

        ch2 = new Chart(document.getElementById('cVol'), {
            type: 'bar',
            data: { labels: Object.keys(volData), datasets:[{ label: 'CANTIDAD', data: Object.values(volData), backgroundColor:'#0d6efd' }] },
            options: { plugins: { title: { display:true, text: 'VOTACIÓN COMISIÓN' } } }
        });
    };

    window.downloadPDF = () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF('l', 'mm', 'a4');
        docPDF.text("Planilla nominal del personal que participo de la encuesta por la fiesta GNA", 14, 15);
        const rows = allDocs.map(d => [d.jer, d.nom, d.ce, d.mi, d.ev, d.vol]);
        docPDF.autoTable({ head: [['JERARQUÍA', 'NOMBRE', 'CE', 'MI', 'EVENTO', 'COMISIÓN']], body: rows, startY: 20 });
        docPDF.save("Listado_GNA.pdf");
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
